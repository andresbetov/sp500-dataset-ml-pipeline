<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 Volatility Predictor | Screener</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/screener.css">
</head>
<body class="bg-slate-900">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 17"></polyline>
                    <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
                <div class="brand-text">
                    <h1>S&P 500 Volatility Predictor</h1>
                    <p>ML-Powered 5D Volatility Forecasting</p>
                </div>
            </div>

            <div class="navbar-search">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="globalSearch" placeholder="Buscar ticker..." class="search-input">
                <div id="searchSuggestions" class="search-suggestions hidden"></div>
            </div>

            <div class="navbar-menu">
                <a href="index.html" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"></rect><rect x="14" y="8" width="7" height="13" rx="1"></rect></svg>
                    Dashboard
                </a>
                <a href="screener.html" class="nav-link active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Screener
                </a>
                <a href="model-hub.html" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10h-10V2z"></path><path d="M21.5 12H12V2.5A9.5 9.5 0 0 1 21.5 12z"></path></svg>
                    Model Hub
                </a>
                <button id="settingsBtn" class="nav-btn" title="Configuración">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
                </button>
                <button id="healthBtn" class="nav-btn" title="Estado de la API">
                    <span id="healthStatus"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-container-full">
        <section class="content-full">
            <!-- Controls Card -->
            <div class="card card-controls">
                <div class="card-controls-header">
                    <h3>Filtros de Búsqueda</h3>
                    <span class="header-badge" id="tickerCounter">S&P 500</span>
                </div>
                <div class="controls-grid">
                    <div class="control-group search-group">
                        <label>Buscar Ticker</label>
                        <input type="text" id="tickerSearch" placeholder="AAPL, NVDA, TSLA..." class="input">
                    </div>
                    <div class="control-group">
                        <label>Mostrar</label>
                        <select id="limitSelect" class="input">
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50" selected>50</option>
                            <option value="100">100</option>
                            <option value="250">250</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Ordenar por</label>
                        <select id="sortBySelect" class="input">
                            <option value="volatility" selected>Volatilidad</option>
                            <option value="ticker">Ticker</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Orden</label>
                        <select id="sortOrderSelect" class="input">
                            <option value="desc" selected>Descendente</option>
                            <option value="asc">Ascendente</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Vol. Mín</label>
                        <input type="number" id="minVolInput" placeholder="0.001" min="0" step="0.001" class="input">
                    </div>
                    <div class="control-group">
                        <label>Vol. Máx</label>
                        <input type="number" id="maxVolInput" placeholder="1.0" min="0" step="0.001" class="input">
                    </div>
                    <div class="control-actions">
                        <button id="clearFiltersBtn" class="btn btn-secondary">✕ Limpiar</button>
                        <button id="exportCsvBtn" class="btn btn-secondary">⬇ CSV</button>
                        <button id="refreshBtn" class="btn btn-primary">↻ Actualizar</button>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="card card-table">
                <div class="table-container">
                    <table class="table table-striped" id="screenTable">
                        <thead>
                            <tr>
                                <th style="width: 4%">#</th>
                                <th style="width: 10%">Ticker</th>
                                <th style="width: 15%">Vol Daily</th>
                                <th style="width: 15%">Annualized</th>
                                <th style="width: 12%">Precio USD</th>
                                <th style="width: 12%">Régimen</th>
                                <th style="width: 16%">Último Precio</th>
                                <th style="width: 16%">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="8" class="loading">Cargando datos...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="table-pagination">
                    <div class="pagination-info">
                        Mostrando <span id="displayCount">0</span> de <span id="totalCount">0</span> tickers
                    </div>
                    <div class="pagination-controls">
                        <button id="prevBtn" class="btn-pagination">◄ Anterior</button>
                        <span id="pageInfo">Página 1</span>
                        <button id="nextBtn" class="btn-pagination">Siguiente ►</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configuración</h2>
                <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>Tema</label>
                    <select id="themeSelect" class="input">
                        <option value="dark">Oscuro</option>
                        <option value="light">Claro</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Decimales</label>
                    <input type="number" id="decimalPlaces" class="input" value="4" min="2" max="8">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Cerrar</button>
                <button class="btn btn-primary" id="saveSetting">Guardar</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/screener.js"></script>
</body>
</html>
